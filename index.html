<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midstar | Prelude Collection</title>
    <meta name="description" content="Midstar product-first landing page featuring the Prelude 17-item streetwear collection.">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/crbftn-premium.css">
</head>
<body data-page="index">
    <div id="navigation-container"></div>

    <section class="hero-video-section" style="position:relative;min-height:78vh;display:flex;align-items:center;background:url('assets/images/hero/hero-main.webp') center/cover no-repeat;">
        <video class="hero-video" autoplay muted loop playsinline preload="metadata" poster="assets/images/hero/hero-main.webp">
            <source src="assets/videos/prelude-hero.mp4" type="video/mp4">
        </video>

        <div class="section-shell animate-fadeInUp hero-parallax-content" style="position:relative;z-index:2;padding:4.6rem 1rem;">
            <h1 class="heading-brand hero-title-outline" style="font-size:clamp(3.2rem,10vw,5.2rem);margin:.2rem 0 1rem;">Prelude</h1>
            <p style="max-width:720px;color:var(--muted);font-size:1.05rem;">Welcome to Prelude — a focused 17-piece drop with premium cuts, faster browsing, and clean quote flow.</p>
            <div style="display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1.1rem;">
                <a href="#collection" class="btn-primary">Browse Products</a>
                <a href="request-quote.html" class="btn-secondary">Request Quote</a>
            </div>
        </div>
    </section>

    <section id="collection" class="section-shell" style="padding:2rem 1rem 2.5rem;">
        <div style="display:flex;justify-content:space-between;align-items:end;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;">
            <div>
                <h2 class="heading-display" style="font-size:2rem;margin:0;">Featured Catalog</h2>
                <p style="margin:.35rem 0 0;color:var(--muted);">17 products only, curated for focus and speed.</p>
            </div>
            <a href="products.html" class="btn-outline-red">Open Full Catalog Page</a>
        </div>

        <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;">
            <button class="filter-btn active" data-filter-btn="all">All</button>
            <button class="filter-btn" data-filter-btn="hoodies">Hoodies</button>
            <button class="filter-btn" data-filter-btn="tshirts">T-Shirts</button>
            <button class="filter-btn" data-filter-btn="pants">Pants</button>
            <button class="filter-btn" data-filter-btn="jackets">Jackets</button>
            <button class="filter-btn" data-filter-btn="womens">Women</button>
            <button class="filter-btn" data-filter-btn="accessories">Accessories</button>
        </div>

        <div id="landing-products-grid" class="product-grid"></div>
    </section>

    <div id="footer-container"></div>
    <div id="modals-container"></div>
    <script src="assets/js/script.js" defer></script>
</body>
</html>
