<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midstar | Gallery</title>
    <meta name="description" content="Midstar visual gallery using existing campaign and product backgrounds.">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/crbftn-premium.css">
</head>
<body data-page="gallery">
    <div id="navigation-container"></div>

    <section style="position:relative;min-height:42vh;display:flex;align-items:center;background:linear-gradient(rgba(4,6,10,.7),rgba(4,6,10,.8)),url('assets/images/gallery/gallery-hero.webp') center/cover no-repeat;">
        <div class="section-shell" style="padding:3rem 1rem;">
            <h1 class="heading-brand" style="font-size:clamp(2rem,4.4vw,3.8rem);margin:0;">Gallery</h1>
            <p style="margin:.7rem 0 0;color:var(--muted);max-width:700px;">A focused visual stream of the Midstar look and atmosphere.</p>
        </div>
    </section>

    <section class="section-shell" style="padding:1.6rem 1rem 2.5rem;">
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;">
            <div class="premium-card"><img src="assets/images/gallery/collection-1.webp" alt="Collection 1" width="1200" height="1200" loading="lazy" decoding="async" style="width:100%;height:260px;object-fit:cover;"></div>
            <div class="premium-card"><img src="assets/images/gallery/collection-2.webp" alt="Collection 2" width="1200" height="1200" loading="lazy" decoding="async" style="width:100%;height:260px;object-fit:cover;"></div>
            <div class="premium-card"><img src="assets/images/gallery/lifestyle-1.webp" alt="Lifestyle 1" width="1200" height="1200" loading="lazy" decoding="async" style="width:100%;height:260px;object-fit:cover;"></div>
            <div class="premium-card"><img src="assets/images/gallery/lifestyle-2.webp" alt="Lifestyle 2" width="1200" height="1200" loading="lazy" decoding="async" style="width:100%;height:260px;object-fit:cover;"></div>
            <div class="premium-card"><img src="assets/images/gallery/lifestyle-3.webp" alt="Lifestyle 3" width="1200" height="1200" loading="lazy" decoding="async" style="width:100%;height:260px;object-fit:cover;"></div>
            <div class="premium-card"><img src="assets/images/hero/hero-about.webp" alt="Brand Story" width="1200" height="1200" loading="lazy" decoding="async" style="width:100%;height:260px;object-fit:cover;"></div>
        </div>
    </section>

    <div id="footer-container"></div>
    <div id="modals-container"></div>
    <script src="assets/js/script.js" defer></script>
</body>
</html>
