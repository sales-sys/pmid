[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "zisi"
  included_files = ["assets/images/logo.png"]

# Environment variables for production (set these in Netlify dashboard)
# EMAIL_USER = your gmail address
# EMAIL_PASS = your gmail app password
# EMAIL_TO = hello@pmid.co.za
# FIREBASE_API_KEY = (optional)
# FIREBASE_AUTH_DOMAIN = (optional)
# FIREBASE_PROJECT_ID = (optional)
# FIREBASE_STORAGE_BUCKET = (optional)
# FIREBASE_MESSAGING_SENDER_ID = (optional)
# FIREBASE_APP_ID = (optional)

[context.production.environment]
  NODE_VERSION = "18"

[context.deploy-preview.environment]
  NODE_VERSION = "18"